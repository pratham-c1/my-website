<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Admission Form</title>
    <link rel="stylesheet" href="style.css">
    <style> 
    * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    padding: 20px;
}

.container {
    max-width: 1000px;
    margin: 0 auto;
    background: white;
    border-radius: 10px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    padding: 30px;
}

.header {
    text-align: center;
    margin-bottom: 30px;
    padding-bottom: 20px;
    border-bottom: 2px solid #f0f0f0;
}

.header h1 {
    color: #333;
    margin-bottom: 10px;
}

.header p {
    color: #666;
    font-size: 1.1em;
}

.message {
    padding: 15px;
    border-radius: 5px;
    margin-bottom: 20px;
    text-align: center;
    font-weight: 500;
}

.message.success {
    background: #d4edda;
    color: #155724;
    border: 1px solid #c3e6cb;
}

.message.error {
    background: #f8d7da;
    color: #721c24;
    border: 1px solid #f5c6cb;
}

.form-section {
    background: #f9f9f9;
    padding: 20px;
    border-radius: 8px;
    margin-bottom: 20px;
}

.form-section h2 {
    color: #333;
    font-size: 1.3em;
    margin-bottom: 20px;
    padding-bottom: 10px;
    border-bottom: 2px solid #667eea;
}

.form-row {
    display: flex;
    gap: 20px;
    margin-bottom: 15px;
}

.form-group {
    flex: 1;
    margin-bottom: 15px;
}

.form-group label {
    display: block;
    margin-bottom: 5px;
    color: #555;
    font-weight: 500;
}

.form-group input,
.form-group select,
.form-group textarea {
    width: 100%;
    padding: 10px;
    border: 1px solid #ddd;
    border-radius: 5px;
    font-size: 1em;
    transition: border 0.3s;
}

.form-group input:focus,
.form-group select:focus,
.form-group textarea:focus {
    outline: none;
    border-color: #667eea;
    box-shadow: 0 0 0 2px rgba(102, 126, 234, 0.1);
}

.form-actions {
    display: flex;
    gap: 15px;
    justify-content: center;
    margin-top: 30px;
}

.btn-submit,
.btn-view,
.btn-logout {
    padding: 12px 30px;
    border: none;
    border-radius: 5px;
    font-size: 1em;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.2s, background 0.2s;
}

.btn-submit {
    background: #667eea;
    color: white;
}

.btn-submit:hover {
    background: #5a67d8;
    transform: translateY(-2px);
}

.btn-view {
    background: #48bb78;
    color: white;
}

.btn-view:hover {
    background: #38a169;
    transform: translateY(-2px);
}

.btn-logout {
    background: #f56565;
    color: white;
    padding: 8px 20px;
}

.btn-logout:hover {
    background: #e53e3e;
}

/* Admin Dashboard Styles */
.login-section {
    max-width: 400px;
    margin: 0 auto;
    padding: 30px;
    background: #f9f9f9;
    border-radius: 8px;
}

.dashboard-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    padding-bottom: 15px;
    border-bottom: 2px solid #f0f0f0;
}

.students-list {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 20px;
}

.student-card {
    background: white;
    border: 1px solid #e0e0e0;
    border-radius: 8px;
    padding: 15px;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
}

.student-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

.student-card h3 {
    color: #333;
    margin-bottom: 10px;
    font-size: 1.1em;
}

.student-card p {
    color: #666;
    margin: 5px 0;
    font-size: 0.9em;
}

.student-card .course-badge {
    display: inline-block;
    background: #667eea;
    color: white;
    padding: 3px 10px;
    border-radius: 15px;
    font-size: 0.8em;
    margin-top: 10px;
}

.loading {
    text-align: center;
    color: #666;
    padding: 40px;
    font-size: 1.2em;
}

.note {
    text-align: center;
    margin-top: 15px;
    color: #666;
    font-size: 0.9em;
}

/* Modal Styles */
.modal {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 1000;
}

.modal-content {
    background: white;
    padding: 30px;
    border-radius: 10px;
    max-width: 600px;
    width: 90%;
    max-height: 80vh;
    overflow-y: auto;
    position: relative;
}

.close {
    position: absolute;
    top: 10px;
    right: 20px;
    font-size: 30px;
    cursor: pointer;
    color: #666;
}

.close:hover {
    color: #333;
}

.detail-item {
    margin-bottom: 15px;
    padding: 10px;
    background: #f9f9f9;
    border-radius: 5px;
}

.detail-item strong {
    display: inline-block;
    width: 150px;
    color: #555;
}

.detail-item span {
    color: #333;
}

@media (max-width: 768px) {
    .form-row {
        flex-direction: column;
        gap: 0;
    }
    
    .container {
        padding: 20px;
    }
    
    .form-actions {
        flex-direction: column;
    }
    
    .detail-item strong {
        display: block;
        width: 100%;
        margin-bottom: 5px;
    }
}
    </style>
    <script>// API Base URL (change this to your backend URL)
const API_BASE_URL = 'http://localhost:5000/api';

// ==================== REGISTRATION FORM HANDLING ====================
const admissionForm = document.getElementById('admissionForm');
if (admissionForm) {
    admissionForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        // Show loading state
        const submitBtn = document.querySelector('.btn-submit');
        const originalText = submitBtn.textContent;
        submitBtn.textContent = 'Submitting...';
        submitBtn.disabled = true;
        
        // Get form data
        const formData = {
            full_name: document.getElementById('full_name').value,
            email: document.getElementById('email').value,
            phone: document.getElementById('phone').value,
            date_of_birth: document.getElementById('date_of_birth').value,
            address: document.getElementById('address').value,
            course: document.getElementById('course').value,
            previous_school: document.getElementById('previous_school').value,
            father_name: document.getElementById('father_name').value,
            mother_name: document.getElementById('mother_name').value,
            emergency_contact: document.getElementById('emergency_contact').value
        };
        
        try {
            const response = await fetch(`${API_BASE_URL}/register`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(formData)
            });
            
            const data = await response.json();
            
            if (data.success) {
                showMessage('success', 'Application submitted successfully!');
                admissionForm.reset();
            } else {
                showMessage('error', data.message || 'Submission failed');
            }
        } catch (error) {
            showMessage('error', 'Network error. Please try again.');
            console.error('Error:', error);
        } finally {
            submitBtn.textContent = originalText;
            submitBtn.disabled = false;
        }
    });
}

// ==================== ADMIN LOGIN & DASHBOARD ====================
let isLoggedIn = false;

// Check login status on admin page load
if (window.location.pathname.includes('admin.html')) {
    checkLoginStatus();
}

// Login form handler
const loginForm = document.getElementById('loginForm');
if (loginForm) {
    loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        
        try {
            const response = await fetch(`${API_BASE_URL}/admin/login`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ username, password })
            });
            
            const data = await response.json();
            
            if (data.success) {
                isLoggedIn = true;
                sessionStorage.setItem('adminLoggedIn', 'true');
                showDashboard();
                loadStudents();
            } else {
                alert('Invalid credentials');
            }
        } catch (error) {
            alert('Login failed. Please try again.');
            console.error('Error:', error);
        }
    });
}

// Check if admin is logged in
function checkLoginStatus() {
    isLoggedIn = sessionStorage.getItem('adminLoggedIn') === 'true';
    if (isLoggedIn) {
        showDashboard();
        loadStudents();
    } else {
        document.getElementById('loginSection').style.display = 'block';
        document.getElementById('dashboardSection').style.display = 'none';
    }
}

// Show dashboard (hide login)
function showDashboard() {
    document.getElementById('loginSection').style.display = 'none';
    document.getElementById('dashboardSection').style.display = 'block';
}

// Logout function
function logout() {
    sessionStorage.removeItem('adminLoggedIn');
    isLoggedIn = false;
    document.getElementById('loginSection').style.display = 'block';
    document.getElementById('dashboardSection').style.display = 'none';
}

// Load all students
async function loadStudents() {
    const studentsList = document.getElementById('studentsList');
    
    try {
        const response = await fetch(`${API_BASE_URL}/students`);
        const data = await response.json();
        
        if (data.success && data.students.length > 0) {
            studentsList.innerHTML = data.students.map(student => `
                <div class="student-card" onclick="viewStudent(${student.id})">
                    <h3>${student.full_name}</h3>
                    <p>📧 ${student.email}</p>
                    <p>📞 ${student.phone}</p>
                    <p>📅 Applied: ${new Date(student.submitted_at).toLocaleDateString()}</p>
                    <span class="course-badge">${student.course}</span>
                </div>
            `).join('');
        } else {
            studentsList.innerHTML = '<p class="loading">No applications yet.</p>';
        }
    } catch (error) {
        studentsList.innerHTML = '<p class="loading error">Error loading applications.</p>';
        console.error('Error:', error);
    }
}

// View single student details
async function viewStudent(studentId) {
    try {
        const response = await fetch(`${API_BASE_URL}/students/${studentId}`);
        const data = await response.json();
        
        if (data.success) {
            const student = data.student;
            const detailsHtml = `
                <h2>Student Details</h2>
                <div class="detail-item">
                    <strong>Full Name:</strong> <span>${student.full_name}</span>
                </div>
                <div class="detail-item">
                    <strong>Email:</strong> <span>${student.email}</span>
                </div>
                <div class="detail-item">
                    <strong>Phone:</strong> <span>${student.phone}</span>
                </div>
                <div class="detail-item">
                    <strong>Date of Birth:</strong> <span>${student.date_of_birth}</span>
                </div>
                <div class="detail-item">
                    <strong>Course:</strong> <span>${student.course}</span>
                </div>
                <div class="detail-item">
                    <strong>Address:</strong> <span>${student.address}</span>
                </div>
                <div class="detail-item">
                    <strong>Father's Name:</strong> <span>${student.father_name || 'N/A'}</span>
                </div>
                <div class="detail-item">
                    <strong>Mother's Name:</strong> <span>${student.mother_name || 'N/A'}</span>
                </div>
                <div class="detail-item">
                    <strong>Previous School:</strong> <span>${student.previous_school || 'N/A'}</span>
                </div>
                <div class="detail-item">
                    <strong>Emergency Contact:</strong> <span>${student.emergency_contact || 'N/A'}</span>
                </div>
                <div class="detail-item">
                    <strong>Submitted:</strong> <span>${student.submitted_at}</span>
                </div>
            `;
            
            document.getElementById('studentDetails').innerHTML = detailsHtml;
            document.getElementById('studentModal').style.display = 'flex';
        }
    } catch (error) {
        alert('Error loading student details');
        console.error('Error:', error);
    }
}

// Close modal
function closeModal() {
    document.getElementById('studentModal').style.display = 'none';
}

// Close modal when clicking outside
window.onclick = function(event) {
    const modal = document.getElementById('studentModal');
    if (event.target === modal) {
        modal.style.display = 'none';
    }
}

// ==================== HELPER FUNCTIONS ====================
function showMessage(type, text) {
    const messageDiv = document.getElementById('message');
    messageDiv.className = `message ${type}`;
    messageDiv.textContent = text;
    messageDiv.style.display = 'block';
    
    setTimeout(() => {
        messageDiv.style.display = 'none';
    }, 5000);
}

// Make functions global for HTML onclick handlers
window.viewStudent = viewStudent;
window.closeModal = closeModal;
window.logout = logout;
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎓 Student Admission Form</h1>
            <p>Fill in the details below to apply for admission</p>
        </div>

        <div id="message" class="message" style="display: none;"></div>

        <form id="admissionForm">
            <div class="form-section">
                <h2>Personal Information</h2>
                
                <div class="form-group">
                    <label for="full_name">Full Name *</label>
                    <input type="text" id="full_name" name="full_name" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="email">Email *</label>
                        <input type="email" id="email" name="email" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="phone">Phone Number *</label>
                        <input type="tel" id="phone" name="phone" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="date_of_birth">Date of Birth *</label>
                        <input type="date" id="date_of_birth" name="date_of_birth" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="course">Course Applying For *</label>
                        <select id="course" name="course" required>
                            <option value="">Select Course</option>
                            <option value="science">Science</option>
                            <option value="management">Management</option>
                            <option value="humanities">Humanities</option>
                            <option value="computer">Computer Science</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="address">Address *</label>
                    <textarea id="address" name="address" rows="3" required></textarea>
                </div>
            </div>

            <div class="form-section">
                <h2>Family & Previous Education</h2>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="father_name">Father's Name</label>
                        <input type="text" id="father_name" name="father_name">
                    </div>
                    
                    <div class="form-group">
                        <label for="mother_name">Mother's Name</label>
                        <input type="text" id="mother_name" name="mother_name">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="previous_school">Previous School</label>
                        <input type="text" id="previous_school" name="previous_school">
                    </div>
                    
                    <div class="form-group">
                        <label for="emergency_contact">Emergency Contact</label>
                        <input type="tel" id="emergency_contact" name="emergency_contact">
                    </div>
                </div>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn-submit">Submit Application</button>
                <button type="button" class="btn-view" onclick="window.location.href='admin.html'">
                    Admin Login →
                </button>
            </div>
        </form>
    </div>

    <script src="script.js"></script>
</body>

</html>
