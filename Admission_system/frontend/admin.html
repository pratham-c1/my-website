<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - View Applications</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>👨‍💼 Admin Dashboard</h1>
            <p>View all student applications</p>
        </div>

        <!-- Login Section (shown when not logged in) -->
        <div id="loginSection" class="login-section">
            <h2>Admin Login</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required>
                </div>
                <button type="submit" class="btn-submit">Login</button>
            </form>
            <p class="note">Default: username: admin, password: admin123</p>
        </div>

        <!-- Dashboard Section (shown after login) -->
        <div id="dashboardSection" style="display: none;">
            <div class="dashboard-header">
                <h2>Student Applications</h2>
                <button onclick="logout()" class="btn-logout">Logout</button>
            </div>
            
            <div id="studentsList" class="students-list">
                <!-- Students will be loaded here -->
                <div class="loading">Loading applications...</div>
            </div>
        </div>

        <!-- Student Details Modal -->
        <div id="studentModal" class="modal" style="display: none;">
            <div class="modal-content">
                <span class="close" onclick="closeModal()">&times;</span>
                <div id="studentDetails"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
